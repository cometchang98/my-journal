<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>🔒 📖 系統測試週記（發布功能驗證用）</title>
<style>
:root{--bg:#faf7f5;--card:#fff;--accent:#e67e9b;--text:#2d2a2e;--muted:#9b9498}
@media(prefers-color-scheme:dark){:root{--bg:#1a1618;--card:#241f22;--accent:#e67e9b;--text:#f0eaed;--muted:#8a8288}}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.8}
.wrap{max-width:680px;margin:0 auto;padding:32px 20px 80px}
h1{font-size:26px;margin-bottom:4px}
.meta{color:var(--muted);font-size:13px;margin-bottom:28px}
img{max-width:100%;border-radius:12px;margin:16px 0;display:block}
a{color:var(--accent)}
.back{display:inline-block;margin-bottom:20px;color:var(--muted);text-decoration:none;font-size:14px}
.lock-box{background:var(--card);border-radius:16px;padding:24px;margin-top:20px}
.lock-box input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(230,126,155,.4);background:transparent;color:var(--text);font-size:15px;margin-bottom:10px}
.lock-box button{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;cursor:pointer}
.err{color:var(--accent);font-size:13px;margin-top:8px;display:none}
.post-item{background:var(--card);border-radius:14px;padding:16px 18px;margin-bottom:12px;text-decoration:none;display:block;color:var(--text)}
.post-item .t{font-size:16px;font-weight:600}
.post-item .d{color:var(--muted);font-size:13px;margin-top:4px}
</style></head><body><div class="wrap">
<a class="back" href="../index.html">← 回目錄</a>
<h1>🔒 📖 系統測試週記（發布功能驗證用）</h1><div class="meta">2026-07-19 11:22（私人文章，需要密碼）</div>
<div class="lock-box" id="lockBox">
  <input type="password" id="pw" placeholder="輸入密碼解鎖">
  <button onclick="unlock()">解鎖</button>
  <div class="err" id="err">密碼錯誤，再試一次！</div>
</div>
<div id="content" style="display:none"></div>
<script>
const enc = {"salt": "YLDWBh2+0AHRdv1RUGDTrw==", "iv": "6FMofDYQQEo7z+XS", "data": "Ar7XQv/V262IpmGHB71NVnEjdI3aEzTN2CxjEiM2rh4g9Pj4GAU8c8JPtC41PiHH9imwV4kyVtiDyjgS7mDS+DAYc5/Uf9CcPLyjW6Rhhqi1at89jON1vwJLgKZZzLq5FK4zC+UVics5UasCmZ2/beTIEDH+NqZ2/tHI7avVYPYMhRK+tC1hNzxWCQAyAbZSpcZoPUd6vPa1ie2KBfcX5wPCd/OnG9BdT3AQG7BK4kHYF01s9v/ALTzmPNCLqMepRvmxW7C8dY7UIg==", "iterations": 100000};
function b64(s){return Uint8Array.from(atob(s), c => c.charCodeAt(0))}
async function unlock(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  try {
    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64(enc.salt), iterations:enc.iterations, hash:'SHA-256'},
      keyMaterial, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(enc.iv)}, key, b64(enc.data));
    document.getElementById('content').innerHTML = new TextDecoder().decode(plain);
    document.getElementById('content').style.display = 'block';
    document.getElementById('lockBox').style.display = 'none';
    err.style.display = 'none';
  } catch(e) {
    err.style.display = 'block';
  }
}
document.getElementById('pw').addEventListener('keydown', e => { if(e.key === 'Enter') unlock(); });
</script>
</div></body></html>
